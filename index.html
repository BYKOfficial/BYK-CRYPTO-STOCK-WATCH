<!DOCTYPE html>
<html>
<head>
  <title>BYK Crypto & Stock Watch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background:#0b0f19;
      color:white;
      font-family:Arial;
      margin:0;
    }

    header {
      padding:15px;
      background:#111827;
      text-align:center;
      font-size:22px;
      font-weight:bold;
    }

    .container {
      padding:15px;
    }

    input {
      width:100%;
      padding:12px;
      margin:10px 0;
      border-radius:8px;
      border:none;
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
      gap:10px;
    }

    .card {
      background:#1f2937;
      padding:15px;
      border-radius:10px;
      text-align:center;
      transition:0.3s;
    }

    .card:hover {
      transform:scale(1.05);
      background:#374151;
    }

    h2 {
      margin-top:20px;
    }

    button {
      padding:8px 12px;
      border:none;
      border-radius:6px;
      background:#2563eb;
      color:white;
      cursor:pointer;
    }

    .topbar {
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .section {
      margin-top:20px;
    }
  </style>
</head>

<body>

<header>🚀 BYK Crypto & Stock Watch</header>

<div class="container">

<div class="topbar">
  <input id="search" placeholder="Search crypto..." onkeyup="filterCoins()">
  <button onclick="toggleMode()">🌙</button>
</div>

<p id="status">Loading...</p>

<div class="grid" id="crypto"></div>

<div class="section">
<h2>⭐ Watchlist</h2>
<div id="watchlist"></div>
</div>

<div class="section">
<h2>🚀 Top Gainers</h2>
<div id="gainers"></div>
</div>

<div class="section">
<h2>📉 Top Losers</h2>
<div id="losers"></div>
</div>

<div class="section">
<h2>🔥 Next Bitcoin</h2>
<div id="nextbtc"></div>
</div>

<div class="section">
<h2>📊 BTC Chart</h2>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=BTCUSD" width="100%" height="300"></iframe>
</div>

</div>

<script>
let allCoins=[];
let watchlist=JSON.parse(localStorage.getItem("watchlist"))||[];

// LOAD DATA
async function loadCrypto(){
  const res=await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd");
  const data=await res.json();

  allCoins=data;

  showCoins(data.slice(0,20));
  showStats(data);
  showNextBTC(data);
  showWatchlist();

  document.getElementById("status").innerText="✅ Live";
}

// SHOW COINS
function showCoins(coins){
  document.getElementById("crypto").innerHTML =
    coins.map(c=>`
      <div class="card">
        <h3>${c.name}</h3>
        <p>$${c.current_price}</p>
        <button onclick="addToWatch('${c.name}')">⭐</button>
      </div>`).join("");
}

// SEARCH
function filterCoins(){
  const val=document.getElementById("search").value.toLowerCase();
  showCoins(allCoins.filter(c=>c.name.toLowerCase().includes(val)).slice(0,20));
}

// WATCHLIST
function addToWatch(n){
  if(!watchlist.includes(n)){
    watchlist.push(n);
    localStorage.setItem("watchlist",JSON.stringify(watchlist));
    showWatchlist();
  }
}
function showWatchlist(){
  document.getElementById("watchlist").innerHTML=
    watchlist.map(w=>`<p>⭐ ${w}</p>`).join("");
}

// STATS
function showStats(d){
  const g=[...d].sort((a,b)=>b.price_change_percentage_24h-a.price_change_percentage_24h).slice(0,5);
  const l=[...d].sort((a,b)=>a.price_change_percentage_24h-b.price_change_percentage_24h).slice(0,5);

  document.getElementById("gainers").innerHTML=g.map(c=>`<p>${c.name}</p>`).join("");
  document.getElementById("losers").innerHTML=l.map(c=>`<p>${c.name}</p>`).join("");
}

// NEXT BTC
function showNextBTC(d){
  const c=d.filter(x=>x.market_cap<5000000000 && x.price_change_percentage_24h>5).slice(0,5);
  document.getElementById("nextbtc").innerHTML=c.map(x=>`<p>🔥 ${x.name}</p>`).join("");
}

// THEME
function toggleMode(){
  document.body.style.background=
    document.body.style.background==="white"?"#0b0f19":"white";
}

// AUTO
setInterval(loadCrypto,15000);

loadCrypto();
</script>

</body>
</html>
