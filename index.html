<!DOCTYPE html>
<html>
<head>
  <title>BYK Crypto & Stock Watch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { background:#0d1117; color:white; font-family:sans-serif; text-align:center; }
    .card { background:#161b22; margin:10px; padding:15px; border-radius:12px; }
    input,button { padding:10px; margin:5px; border-radius:10px; }
    .hot { color:orange; }
  </style>
</head>

<body>

<h1>🚀 BYK Crypto & Stock Watch</h1>

<button onclick="toggleMode()">🌙 Theme</button>

<input id="search" placeholder="Search crypto..." onkeyup="filterCoins()">

<p id="status">Loading...</p>

<div id="crypto"></div>

<h2>⭐ Watchlist</h2>
<div id="watchlist"></div>

<h2>🚀 Gainers</h2>
<div id="gainers"></div>

<h2>📉 Losers</h2>
<div id="losers"></div>

<h2>🔥 Next Bitcoin</h2>
<div id="nextbtc"></div>

<h2>📊 Chart</h2>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=BTCUSD" width="100%" height="300"></iframe>

<h2>💰 Portfolio</h2>
<input id="coinName" placeholder="Coin">
<input id="amount" placeholder="Amount">
<button onclick="addPortfolio()">Add</button>
<div id="portfolio"></div>

<h2>📰 News</h2>
<div id="news"></div>

<h2>⏰ Time</h2>
<div id="clock"></div>

<h2>📢 Share</h2>
<button onclick="shareSite()">Share</button>

<script>
let allCoins=[];
let watchlist=JSON.parse(localStorage.getItem("watchlist"))||[];
let portfolio=JSON.parse(localStorage.getItem("portfolio"))||[];

// LOAD
async function loadCrypto(){
  try{
    const res=await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd");
    const data=await res.json();
    allCoins=data;

    showCoins(data.slice(0,20));
    showStats(data);
    showNextBTC(data);
    showWatchlist();
    showPortfolio();

    document.getElementById("status").innerText="✅ Live";
  }catch{
    document.getElementById("status").innerText="❌ Retry...";
    setTimeout(loadCrypto,3000);
  }
}

// SHOW
function showCoins(coins){
  document.getElementById("crypto").innerHTML =
    coins.map(c=>`
      <div class="card">
        <h3>${c.name} ${c.price_change_percentage_24h>5?"🔥":""}</h3>
        <p>$${c.current_price}</p>
        <button onclick="addToWatch('${c.name}')">⭐</button>
      </div>`).join("");
}

// SEARCH
function filterCoins(){
  const val=document.getElementById("search").value.toLowerCase();
  showCoins(allCoins.filter(c=>c.name.toLowerCase().includes(val)).slice(0,20));
}

// WATCHLIST
function addToWatch(n){
  if(!watchlist.includes(n)){
    watchlist.push(n);
    localStorage.setItem("watchlist",JSON.stringify(watchlist));
    showWatchlist();
  }
}
function showWatchlist(){
  document.getElementById("watchlist").innerHTML=
    watchlist.map(w=>`<p>⭐ ${w}</p>`).join("");
}

// STATS
function showStats(d){
  const g=[...d].sort((a,b)=>b.price_change_percentage_24h-a.price_change_percentage_24h).slice(0,5);
  const l=[...d].sort((a,b)=>a.price_change_percentage_24h-b.price_change_percentage_24h).slice(0,5);

  document.getElementById("gainers").innerHTML=g.map(c=>`<p>${c.name}</p>`).join("");
  document.getElementById("losers").innerHTML=l.map(c=>`<p>${c.name}</p>`).join("");
}

// NEXT BTC
function showNextBTC(d){
  const c=d.filter(x=>x.market_cap<5000000000 && x.price_change_percentage_24h>5).slice(0,5);
  document.getElementById("nextbtc").innerHTML=c.map(x=>`<p>🔥 ${x.name}</p>`).join("");
}

// PORTFOLIO
function addPortfolio(){
  const n=document.getElementById("coinName").value;
  const a=document.getElementById("amount").value;
  portfolio.push({n,a});
  localStorage.setItem("portfolio",JSON.stringify(portfolio));
  showPortfolio();
}
function showPortfolio(){
  document.getElementById("portfolio").innerHTML=
    portfolio.map(p=>`<p>${p.n}: ${p.a}</p>`).join("");
}

// NEWS
function loadNews(){
  const news=["BTC rally 🚀","ETH update 🔥","Altcoins boom 📈"];
  document.getElementById("news").innerHTML=news.map(n=>`<p>${n}</p>`).join("");
}

// CLOCK
setInterval(()=>{
  document.getElementById("clock").innerText=new Date().toLocaleTimeString();
},1000);

// SHARE
function shareSite(){
  if(navigator.share){
    navigator.share({title:"BYK Crypto",url:location.href});
  }else{
    alert("Copy link to share");
  }
}

// THEME
function toggleMode(){
  document.body.style.background=
    document.body.style.background==="white"?"#0d1117":"white";
}

// AUTO
setInterval(loadCrypto,15000);
setTimeout(()=>alert("🔥 Welcome"),3000);

// INIT
loadCrypto();
loadNews();
</script>

</body>
</html>
